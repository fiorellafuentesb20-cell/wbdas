<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños Therian 🎂</title>
<link href="https://api.fontshare.com/v2/css?f[]=boska@400,700&f[]=satoshi@400,700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: #0d0a1a;
    --color-surface: #16122a;
    --color-surface-2: #1e1836;
    --color-text: #f0ecff;
    --color-text-muted: #a89dcf;
    --color-primary: #c084fc;
    --color-gold: #fbbf24;
    --color-pink: #f472b6;
    --font-display: 'Boska', Georgia, serif;
    --font-body: 'Satoshi', 'Helvetica Neue', sans-serif;
    --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
    --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
    --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
    --text-hero: clamp(2.5rem, 0.5rem + 7vw, 5.5rem);
    --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
    --space-6: 1.5rem; --space-8: 2rem;
    --radius-full: 9999px;
    --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
  body {
    min-height: 100dvh; background: var(--color-bg); color: var(--color-text);
    font-family: var(--font-body); overflow-x: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  img { display: block; max-width: 100%; height: auto; }
  #particles-canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }

  .page {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    padding: var(--space-8) var(--space-4);
    width: 100%; max-width: 520px;
  }

  .card {
    background: linear-gradient(135deg, var(--color-surface) 0%, var(--color-surface-2) 100%);
    border: 1px solid oklch(0.7 0.15 290 / 0.25); border-radius: 2rem;
    padding: clamp(2rem, 5vw, 3rem); width: 100%; text-align: center;
    position: relative; overflow: hidden;
    box-shadow: 0 0 60px oklch(0.65 0.25 290 / 0.18), 0 4px 24px oklch(0 0 0 / 0.5);
    animation: card-enter 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes card-enter { from{opacity:0;transform:translateY(40px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }
  .card::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 50% -20%, oklch(0.65 0.25 290 / 0.12) 0%, transparent 60%);
    pointer-events:none;
  }

  .cake-container { margin: 0 auto var(--space-6); width:120px; height:120px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .flame { animation: flicker 0.8s ease-in-out infinite alternate; transform-origin: center bottom; }
  .flame:nth-child(2){animation-delay:0.15s} .flame:nth-child(3){animation-delay:0.3s}
  @keyframes flicker { 0%{transform:scaleX(1) scaleY(1) rotate(-3deg);opacity:1} 100%{transform:scaleX(0.85) scaleY(1.12) rotate(3deg);opacity:0.85} }

  .title {
    font-family: var(--font-display); font-size: var(--text-hero); font-weight:700; line-height:1.05; margin-bottom: var(--space-3);
    background: linear-gradient(135deg, var(--color-gold) 0%, var(--color-pink) 50%, var(--color-primary) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    animation: shimmer 3s linear infinite; background-size:200% auto;
  }
  @keyframes shimmer { 0%{background-position:0% center} 100%{background-position:200% center} }

  .name { font-family:var(--font-display); font-size:var(--text-xl); color:var(--color-gold); margin-bottom: var(--space-4); animation: name-appear 1s 0.4s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes name-appear { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }

  .stars { display:flex; justify-content:center; gap:var(--space-2); margin-bottom:var(--space-6); font-size:1.4rem; }
  .star { animation: star-pop 0.5s cubic-bezier(0.16,1,0.3,1) both; }
  .star:nth-child(1){animation-delay:0.8s} .star:nth-child(2){animation-delay:0.9s} .star:nth-child(3){animation-delay:1.0s} .star:nth-child(4){animation-delay:1.1s} .star:nth-child(5){animation-delay:1.2s}
  @keyframes star-pop { from{opacity:0;transform:scale(0) rotate(-20deg)} to{opacity:1;transform:scale(1) rotate(0)} }

  .message { font-size:var(--text-base); color:var(--color-text-muted); line-height:1.7; max-width:38ch; margin:0 auto var(--space-8); animation: fade-up 0.8s 0.6s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes fade-up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .img-wrap {
    display:flex; justify-content:center; margin-bottom: var(--space-4);
    animation: fade-up 0.8s 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  .img-wrap img {
    border-radius: 1.5rem;
    box-shadow: 0 0 40px oklch(0.65 0.25 290 / 0.35);
    width: 280px; height: 280px; object-fit: cover;
  }

  @keyframes confetti-fall { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
  .confetti-piece { position:fixed; top:-10px; pointer-events:none; z-index:999; animation:confetti-fall linear forwards; }

  @media (prefers-reduced-motion:reduce) { *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important} }
</style>
</head>

<script>
const canvas=document.getElementById('particles-canvas');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const COLORS=['#c084fc','#f472b6','#fbbf24','#818cf8','#34d399','#f0abfc'];
const pts=Array.from({length:55},()=>({
  x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,
  r:Math.random()*4+1.5,color:COLORS[Math.floor(Math.random()*COLORS.length)],
  vx:(Math.random()-.5)*.4,vy:-Math.random()*.5-.15,alpha:Math.random()*.5+.2
}));
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.y<-10){p.y=canvas.height+10;p.x=Math.random()*canvas.width;}
    if(p.x<-10)p.x=canvas.width+10;if(p.x>canvas.width+10)p.x=-10;
    ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
  });
  requestAnimationFrame(draw);
}
draw();
function launchConfetti(){
  const colors=['#c084fc','#f472b6','#fbbf24','#818cf8','#34d399','#fde68a'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.left=Math.random()*100+'vw';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.width=(Math.random()*8+4)+'px';p.style.height=(Math.random()*8+4)+'px';
    p.style.borderRadius=Math.random()>.5?'50%':'2px';
    p.style.animationDuration=(Math.random()*2.5+1.5)+'s';
    p.style.animationDelay=(Math.random()*.5)+'s';
    document.body.appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
  }
}
setTimeout(launchConfetti,800);setTimeout(launchConfetti,2200);
</script>
